# FTC scrape targets — Reference Synthesis (Section 2)
# Source taxonomy maps to tier-6 scrapers in agents/REGISTRY.yaml
# Add or remove URLs freely; the scraper respects robots.txt and rate-limits per host.

pinterest:
  # Public board URLs only. Auth-walled pins are skipped.
  - https://www.pinterest.com/search/pins/?q=luxury%20streetwear%20editorial
  - https://www.pinterest.com/search/pins/?q=fear%20of%20god%20lookbook
  - https://www.pinterest.com/search/pins/?q=lemaire%20editorial
  - https://www.pinterest.com/search/pins/?q=monastic%20fashion%20editorial
  - https://www.pinterest.com/search/pins/?q=tonal%20embroidery%20detail
  # User-added Pinterest boards (2026-05-25)
  - https://au.pinterest.com/ideas/graphic-t-shirts-street-style/947339884093/
  - https://au.pinterest.com/pin/vintage-graphic-tees-collection--20688479531795623/
  - https://www.pinterest.com/search/pins/?q=streetwear+graphic+tee+pinterest
  - https://pin.it/MHuaw0Ozs

vexels:
  # Template references for print-ready graphic style benchmarks
  - https://www.vexels.com/psd/preview/344685/chrome-text-scalable-t-shirt-psd
  - https://www.vexels.com/templates/t-shirt/
  - https://www.vexels.com/tags/streetwear/

reddit_streetwear:
  # JSON API endpoints — no auth required for public data
  - https://www.reddit.com/r/streetwear/top.json?t=month&limit=25
  - https://www.reddit.com/r/streetwearstartup/top.json?t=month&limit=25
  - https://www.reddit.com/r/findfashion/search.json?q=graphic+tee+streetwear&sort=top&t=month

youtube_trends:
  # YouTube channel pages for streetwear design inspiration context
  - https://www.youtube.com/results?search_query=streetwear+graphic+tee+design+2025
  - https://www.youtube.com/results?search_query=christian+streetwear+brand+2025

kittl:
  - https://www.kittl.com/templates/streetwear
  - https://www.kittl.com/templates/typography

stampd:
  - https://www.stampd.com/collections/all

ssense:
  - https://www.ssense.com/en-us/editorial
  - https://www.ssense.com/en-us/men/designers/fear-of-god-essentials

dover_street_market:
  - https://shop.doverstreetmarket.com/

# Optional luxury benchmarks
luxury_benchmarks:
  - https://www.lemaire.fr/
  - https://www.fearofgod.com/

# Limits applied across all targets
limits:
  max_pages_per_host: 10
  rate_limit_rps: 0.5
  user_agent: "FTC-ReferenceBot/0.1 (+contact: ops@ftc.local)"
  respect_robots_txt: true
