  - id: FTC-234
    name: twitter-thread-architect
    tier: tier-27-cross-platform-media
    summary: Architects Twitter/X threads that share FTC's design philosophy without marketing-speak.
    reports_to: caption-strategist
    consumes: [concepts/*.json, artifacts/brand/narrative_archive.md]
    produces: [artifacts/copy/threads/*.json]
    model: deepseek-flash-v4
    tools: [read, write]
