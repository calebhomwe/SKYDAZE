    model: claude-haiku-4-5
    tools: [read, calc, write]
    gates: ["budget_remaining >= alert_threshold"]
    system_prompt: |
      You are the Cost Monitor. Track per-API spend. Alarm at 80% of
      budget. Recommend which agent to throttle if needed.
    handoff_to: [brand-steward]

  - id: FTC-091
    name: api-health-checker
    tier: tier-13-infrastructure
    summary: Pings provider APIs and tracks availability and latency.
    reports_to: brand-steward
    consumes: [provider_endpoints.yaml]
    produces: [api_health.json]
    model: claude-haiku-4-5
    tools: [http_ping, write]
    gates: ["check_interval_s >= 60"]
    system_prompt: |
