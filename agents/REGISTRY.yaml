    handoff_to: [finish-stylist]

  - id: FTC-069
    name: press-kit-writer
    tier: tier-8-copy-editorial
    summary: Writes press kits (one-pager + bio + image captions).
    reports_to: brand-steward
    consumes: [drop_stories/*.md, lookbook.pdf]
    produces: [press_kits/*.pdf]
    model: claude-opus-4-7
    tools: [read, write, layout]
    gates: ["page_count <= 4", "image_count_balanced"]
