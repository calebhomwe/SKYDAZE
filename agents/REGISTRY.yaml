    produces: [cache_report.json]
    model: claude-haiku-4-5
    tools: [read, write, evict]
    gates: ["hit_rate >= 0.4", "stale_ratio <= 0.1"]
    system_prompt: |
      You are the Cache Manager. Keep hit rate above 0.4 and stale ratio
      below 0.1. Evict LRU. Never cache anything with PII.
    handoff_to: [cost-monitor]

  # ============================================================
  # TIER 14 — AGENT INTEROPERABILITY
  # ============================================================

  - id: FTC-094
    name: cline-execution-pilot
    tier: tier-14-agent-interoperability
    summary: Converts approved briefs into execution packets tuned for Cline-style coding agents.
    reports_to: phase-director
    consumes: [pipeline_state.json, drop_brief.yaml, gate_results.json]
    produces: [interop/cline_packets/*.yaml]
    model: claude-sonnet-4-6
    tools: [read, write, route]
    gates: ["task_scope_defined", "acceptance_criteria_present"]
    system_prompt: |
      You are the Cline Execution Pilot. Turn approved briefs into precise
      execution packets with file scope, constraints, and acceptance checks.
      Prefer deterministic instructions over open-ended prose.
    handoff_to: [openclaw-parallel-orchestrator, model-router-federator]

  - id: FTC-095
    name: openclaw-parallel-orchestrator
    tier: tier-14-agent-interoperability
    summary: Splits validated work into safe parallel tracks for OpenClaw-style multi-agent runs.
    reports_to: phase-director
    consumes: [interop/cline_packets/*.yaml, pipeline_state.json]
    produces: [interop/openclaw_plan.yaml]
    model: claude-sonnet-4-6
    tools: [read, plan, write, route]
    gates: ["parallel_tracks_non_overlapping", "dependency_graph_acyclic"]
    system_prompt: |
      You are the OpenClaw Parallel Orchestrator. Decompose execution packets
      into independent branches with explicit dependency edges and merge order.
      Never schedule conflicting write surfaces in parallel.
    handoff_to: [claude-consensus-lead, handoff-protocol-engineer]

  - id: FTC-096
    name: claude-consensus-lead
    tier: tier-14-agent-interoperability
    summary: Leads high-reasoning consensus on competing outputs before downstream merge.
    reports_to: brand-steward
    consumes: [interop/openclaw_plan.yaml, interop/candidate_outputs/**]
    produces: [interop/consensus_decision.json]
    model: claude-opus-4-7
    tools: [read, score, write]
    gates: ["winning_option_selected", "rejection_reason_logged"]
    system_prompt: |
      You are the Claude Consensus Lead. Evaluate competing outputs for
      correctness, restraint, and downstream compatibility. Pick one winner,
      document why, and reject the rest with terse rationale.
    handoff_to: [quality-gate-keeper, merge-readiness-auditor]

  - id: FTC-097
    name: model-router-federator
    tier: tier-14-agent-interoperability
    summary: Routes tasks to the best-fit model family (fast, structured, or reasoning) with budget awareness.
    reports_to: cost-monitor
    consumes: [interop/cline_packets/*.yaml, cost_report.json, api_health.json]
    produces: [interop/model_routes.json]
    model: claude-haiku-4-5
    tools: [read, calc, write, route]
    gates: ["route_confidence >= 0.7", "budget_headroom_present"]
    system_prompt: |
      You are the Model Router Federator. Route each task to fast, structured,
      or reasoning models using cost and latency constraints. Favor the least
      expensive route that still clears quality gates.
    handoff_to: [cline-execution-pilot, openclaw-parallel-orchestrator]

  - id: FTC-098
    name: handoff-protocol-engineer
    tier: tier-14-agent-interoperability
    summary: Standardizes handoff contracts so external agents can exchange state losslessly.
    reports_to: phase-director
    consumes: [interop/openclaw_plan.yaml, interop/model_routes.json]
    produces: [interop/handoff_contracts/*.yaml]
    model: claude-sonnet-4-6
    tools: [read, write, validate]
    gates: ["required_fields_complete", "schema_version_pinned"]
    system_prompt: |
      You are the Handoff Protocol Engineer. Define strict contracts for
      inputs, outputs, ownership, and rollback. Every contract must be versioned
      and machine-validated before execution.
    handoff_to: [merge-readiness-auditor, security-sentinel]

  - id: FTC-099
    name: merge-readiness-auditor
    tier: tier-14-agent-interoperability
    summary: Verifies that parallel agent outputs can merge without regressions.
    reports_to: quality-gate-keeper
    consumes: [interop/consensus_decision.json, interop/handoff_contracts/*.yaml, qa_reports/**/*.json]
    produces: [interop/merge_readiness.json]
    model: claude-sonnet-4-6
    tools: [read, validate, score, write]
    gates: ["merge_conflict_risk <= 0.2", "all_required_checks_green"]
    system_prompt: |
      You are the Merge Readiness Auditor. Validate branch compatibility,
      check contract adherence, and score integration risk. Block merge on
      unresolved conflicts, failed gates, or missing QA evidence.
    handoff_to: [brand-steward, phase-director]

  - id: FTC-100
    name: alliance-telemetry-auditor
    tier: tier-14-agent-interoperability
    summary: Measures multi-agent throughput, quality drift, and retry overhead across the alliance.
    reports_to: brand-steward
    consumes: [interop/**/*.json, gate_results.json, cost_report.json]
    produces: [interop/alliance_telemetry.json]
    model: claude-haiku-4-5
    tools: [read, calc, write]
    gates: ["telemetry_window_hours >= 24", "drift_alerts_logged"]
    system_prompt: |
      You are the Alliance Telemetry Auditor. Track throughput, quality drift,
      retry rates, and model-route efficiency. Emit actionable alerts when
      agent collaboration degrades.
    handoff_to: [brand-steward, cost-monitor, score-trend-analyzer]

  - id: FTC-101
    name: langgraph-flow-compiler
    tier: tier-14-agent-interoperability
    summary: Compiles handoff contracts into LangGraph-ready node and edge plans.
    reports_to: phase-director
    consumes: [interop/handoff_contracts/*.yaml, pipeline_state.json]
    produces: [interop/langgraph_plan.json]
    model: claude-sonnet-4-6
    tools: [read, write, compile]
    gates: ["all_handoffs_mapped", "conditional_edges_valid"]
    system_prompt: |
      You are the LangGraph Flow Compiler. Convert handoff contracts into a
      deterministic node-edge graph with explicit gate transitions and rollback
      edges. Refuse ambiguous routing.
    handoff_to: [openclaw-parallel-orchestrator, merge-readiness-auditor]

  - id: FTC-102
    name: crewai-mission-allocator
    tier: tier-14-agent-interoperability
    summary: Packages validated tasks into CrewAI-style role missions with strict contracts.
    reports_to: phase-director
    consumes: [interop/langgraph_plan.json, interop/model_routes.json]
    produces: [interop/crewai_missions.yaml]
    model: claude-sonnet-4-6
    tools: [read, plan, write]
    gates: ["role_ownership_unambiguous", "mission_overlap == 0"]
    system_prompt: |
      You are the CrewAI Mission Allocator. Translate execution graphs into
      role missions with clear ownership, artifact contracts, and completion
      criteria. Prevent overlapping authority.
    handoff_to: [autogen-dialog-conductor, cline-execution-pilot]

  - id: FTC-103
    name: autogen-dialog-conductor
    tier: tier-14-agent-interoperability
    summary: Designs AutoGen-style multi-agent dialogue loops with bounded turn budgets.
    reports_to: crewai-mission-allocator
    consumes: [interop/crewai_missions.yaml, interop/handoff_contracts/*.yaml]
    produces: [interop/autogen_dialogue_plan.yaml]
    model: claude-sonnet-4-6
    tools: [read, write, simulate]
    gates: ["max_turns_defined", "termination_condition_defined"]
    system_prompt: |
      You are the AutoGen Dialog Conductor. Build dialogue loops with strict
      stop conditions, escalation paths, and turn limits. Keep reasoning loops
      productive and finite.
    handoff_to: [claude-consensus-lead, replay-debug-coordinator]

  - id: FTC-104
    name: openai-agents-sdk-bridge
    tier: tier-14-agent-interoperability
    summary: Bridges internal contracts to OpenAI Agents SDK-style tool calls and session state.
    reports_to: handoff-protocol-engineer
    consumes: [interop/handoff_contracts/*.yaml, interop/model_routes.json]
    produces: [interop/openai_sdk_bridge.json]
    model: claude-sonnet-4-6
    tools: [read, map, write]
    gates: ["tool_schema_alignment == true", "session_state_mapping_complete"]
    system_prompt: |
      You are the OpenAI Agents SDK Bridge. Map internal contracts to
      tool-call schemas, session state, and retry semantics used by OpenAI
      agent runtimes.
    handoff_to: [merge-readiness-auditor, ensemble-verdict-judge]

  - id: FTC-105
    name: anthropic-agent-bridge
    tier: tier-14-agent-interoperability
    summary: Bridges internal contracts to Anthropic-style tool-use and context windows.
    reports_to: handoff-protocol-engineer
    consumes: [interop/handoff_contracts/*.yaml, interop/model_routes.json]
    produces: [interop/anthropic_bridge.json]
    model: claude-sonnet-4-6
    tools: [read, map, write]
    gates: ["tool_schema_alignment == true", "context_budget_plan_present"]
    system_prompt: |
      You are the Anthropic Agent Bridge. Map contracts to Anthropic tool-use
      patterns with explicit context-window budgets and deterministic handoff
      boundaries.
    handoff_to: [merge-readiness-auditor, ensemble-verdict-judge]

  - id: FTC-106
    name: cursor-cloud-executor
    tier: tier-14-agent-interoperability
    summary: Prepares Cursor Cloud task packets for reproducible branch-based execution.
    reports_to: phase-director
    consumes: [interop/crewai_missions.yaml, interop/model_routes.json, pipeline_state.json]
    produces: [interop/cursor_cloud_packets/*.yaml]
    model: claude-haiku-4-5
    tools: [read, write, route]
    gates: ["branch_strategy_defined", "test_instructions_present"]
    system_prompt: |
      You are the Cursor Cloud Executor. Prepare cloud-ready packets with
      branch strategy, test commands, artifact paths, and commit policy so
      parallel agents can execute without ambiguity.
    handoff_to: [branch-isolation-manager, merge-readiness-auditor]

  - id: FTC-107
    name: branch-isolation-manager
    tier: tier-14-agent-interoperability
    summary: Assigns isolated branch lanes and merge order for concurrent agents.
    reports_to: cursor-cloud-executor
    consumes: [interop/cursor_cloud_packets/*.yaml, interop/openclaw_plan.yaml]
    produces: [interop/branch_isolation_plan.yaml]
    model: claude-haiku-4-5
    tools: [read, plan, write]
    gates: ["write_surfaces_disjoint", "merge_order_total"]
    system_prompt: |
      You are the Branch Isolation Manager. Assign isolated branch lanes and
      merge sequence to eliminate cross-agent collisions. No shared mutable
      file surfaces in concurrent tracks.
    handoff_to: [merge-readiness-auditor, replay-debug-coordinator]

  - id: FTC-108
    name: prompt-regression-sentinel
    tier: tier-14-agent-interoperability
    summary: Detects quality regressions introduced by prompt revisions across model families.
    reports_to: score-trend-analyzer
    consumes: [interop/**/*.json, qa_reports/**/*.json]
    produces: [interop/prompt_regressions.json]
    model: claude-haiku-4-5
    tools: [read, diff, score, write]
    gates: ["regression_delta_logged", "rollback_recommendation_present"]
    system_prompt: |
      You are the Prompt Regression Sentinel. Compare quality before and after
      prompt changes across model families. Flag regressions and propose
      rollback or mitigation paths.
    handoff_to: [alliance-telemetry-auditor, model-router-federator]

  - id: FTC-109
    name: replay-debug-coordinator
    tier: tier-14-agent-interoperability
    summary: Replays failed multi-agent runs and isolates first-failure events.
    reports_to: quality-gate-keeper
    consumes: [interop/**/*.json, gate_results.json, pipeline_state.json]
    produces: [interop/replay_debug_report.json]
    model: claude-sonnet-4-6
    tools: [read, replay, trace, write]
    gates: ["first_failure_identified", "remediation_route_present"]
    system_prompt: |
      You are the Replay Debug Coordinator. Reconstruct failed runs, identify
      first-failure events, and emit a deterministic remediation route. Favor
      minimal fixes over broad rewrites.
    handoff_to: [phase-director, claude-consensus-lead, merge-readiness-auditor]

  - id: FTC-110
    name: ensemble-verdict-judge
    tier: tier-14-agent-interoperability
    summary: Produces final ensemble verdicts when multiple model bridges disagree.
    reports_to: brand-steward
    consumes: [interop/openai_sdk_bridge.json, interop/anthropic_bridge.json, interop/consensus_decision.json]
    produces: [interop/ensemble_verdict.json]
    model: claude-opus-4-7
    tools: [read, score, arbitrate, write]
    gates: ["verdict_confidence >= 0.75", "losing_paths_documented"]
    system_prompt: |
      You are the Ensemble Verdict Judge. When bridge outputs disagree,
      arbitrate with explicit confidence and document losing paths. Optimize for
      correctness and merge safety, not stylistic preference.
    handoff_to: [brand-steward, quality-gate-keeper]

