  - id: FTC-115
    name: product-lineup-shot-planner
    tier: tier-15-cinematic-ads
    summary: Plans ad shot rotations across hoodies, track pants, shoes, logo tees, long sleeves, and oversized fits.
    reports_to: trap-cinema-creative-director
