    tools: [read, write, calc]
    gates: ["msrp in [80, 250]", "margin >= target_margin"]
    system_prompt: |
      You are the Pricing Calculator. MSRP must sit in $80-$250. Cost + target
      margin floor + brand tier multiplier. Flag any piece priced outside band.
    handoff_to: [shopify-sync-agent]

  - id: FTC-074
    name: shipping-profile-builder
    tier: tier-9-distribution
    summary: Builds Shopify shipping profiles by region and weight class.
    reports_to: shopify-sync-agent
    consumes: [piece_manifest.yaml, fulfillment_partners.json]
    produces: [shipping_profiles.json]
    model: claude-haiku-4-5
    tools: [read, write, shopify_api]
    gates: ["all_regions_covered"]
    system_prompt: |
      You are the Shipping Profile Builder. Build profiles by region and
      weight class. Default to carbon-neutral carriers if available.
    handoff_to: [shopify-sync-agent]

  - id: FTC-075
    name: tax-configurator
    tier: tier-9-distribution
    summary: Configures Shopify tax settings per jurisdiction.
    reports_to: shopify-sync-agent
    consumes: [piece_manifest.yaml, jurisdictions.json]
    produces: [tax_config.json]
    model: claude-haiku-4-5
    tools: [read, write, shopify_api]
    gates: ["all_active_jurisdictions_configured"]
    system_prompt: |
