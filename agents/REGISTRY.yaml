    gates: ["word_count in [400, 700]", "no_overt_religion"]
    system_prompt: |
      You are the Drop Story Writer. 400-700 words. Read like an essay
      fragment, not marketing. Open with a sensory image. Close on silence.
    handoff_to: [press-kit-writer]

  - id: FTC-067
    name: product-description-writer
