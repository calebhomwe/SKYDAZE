      with premium cloth behavior, controlled lighting, and trap-influenced
      youth energy under FTC restraint.
    handoff_to: [cinematic-video-prompt-engineer, ad-performance-rerank-analyst]

  - id: FTC-118
    name: cinematic-video-prompt-engineer
    tier: tier-15-cinematic-ads
    summary: Builds short-form cinematic ad prompts with Novita-first and OpenRouter fallback execution.
    reports_to: trap-cinema-creative-director
    consumes: [ads/shot_plans/*.yaml, ads/openrouter_routes.json, ads/culture_calibration/*.json]
