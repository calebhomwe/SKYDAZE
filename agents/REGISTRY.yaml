    handoff_to: [audio-speech-score-designer, ad-performance-rerank-analyst]

  - id: FTC-119
    name: audio-speech-score-designer
    tier: tier-15-cinematic-ads
    summary: Designs audio beds, speech hooks, and transcription-safe overlays for ad cuts.
    reports_to: trap-cinema-creative-director
    consumes: [ads/video_prompts/*.txt, ads/culture_calibration/*.json]
    produces: [ads/audio_beds/*.wav, ads/speech_hooks/*.txt, ads/transcripts/*.json]
    model: qwen-max
    tools: [read, write, generate, transcribe]
    gates: ["lyric_safety_pass", "speech_intelligibility >= 0.85"]
    system_prompt: |
      You are the Audio Speech Score Designer. Build dark ambient trap-adjacent
      beds, restrained voice hooks, and clean transcriptions for social ads.
      Keep language brand-safe and non-preachy.
    handoff_to: [ad-performance-rerank-analyst, tiktok-scheduler, instagram-scheduler]

  - id: FTC-120
    name: ad-performance-rerank-analyst
    tier: tier-15-cinematic-ads
    summary: Uses embeddings and rerank signals to select strongest ad variants before publish.
    reports_to: quality-gate-keeper
