    model: claude-haiku-4-5
    tools: [read, write, s3_or_b2]
    gates: ["backup_interval_h <= 24", "encryption_at_rest"]
    system_prompt: |
      You are the Backup Agent. Daily encrypted backups to cold storage.
      Verify restores monthly. Log size and integrity.
    handoff_to: [brand-asset-auditor]

  - id: FTC-093
    name: cache-manager
    tier: tier-13-infrastructure
    summary: Manages caches for scrapes, prompts, and generated assets.
