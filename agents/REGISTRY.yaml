    tools: [read, write]
    gates: ["sku_unique", "sku_pattern_followed"]
    system_prompt: |
      You are the SKU Builder. Pattern: FTC-<dropcode>-<piecenum>-<color>-<size>.
      Enforce uniqueness. Output sku/*.json with barcodes if requested.
    handoff_to: [shopify-sync-agent]

  - id: FTC-073
