  - id: FTC-180
    name: retention-campaign-planner
    tier: tier-21-demand-retail
    summary: Plans targeted retention campaigns for at-risk customer segments.
    reports_to: email-campaign-manager
    consumes: [artifacts/analytics/churn_signals.json, artifacts/copy/drafts/*.json]
