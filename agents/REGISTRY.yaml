    tools: [read, write, shopify_api]
    gates: ["all_required_fields_filled", "image_count >= 3 per product"]
    system_prompt: |
      You are the Shopify Sync Agent. Push approved pieces only. Minimum 3
      images per product (hero, detail, on-figure). Verify pricing before
      publish.
    handoff_to: [sku-builder, brand-steward]

  - id: FTC-072
    name: sku-builder
