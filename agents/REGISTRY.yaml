      trap-influenced campaign briefs for teen/young-adult energy while
      preserving FTC luxury restraint and theological abstraction.
    handoff_to: [teen-hype-culture-calibrator, christian-trap-symbolism-editor, product-lineup-shot-planner]

  - id: FTC-112
    name: teen-hype-culture-calibrator
